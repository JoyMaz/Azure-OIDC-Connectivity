name: Project 4 - End-to-End Secure Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code from your repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log into Azure using the JSON Secret
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. Deploy the ARM Template
      - name: Deploy ARM Template
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: 'ResourceofJoy' # Ensure this RG exists in Azure
          template: ./Azure_OIDC.json
          parameters: >
            vmName="Project4VM"
            adminUsername="azureuser"
            adminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
            location="centralus"
          failOnStdErr: false
